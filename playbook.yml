---
- name: Deploy test EC2 instance
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        name: awx-test-ec2
        key_name: Admin.pem
        instance_type: t2.micro
        image_id: ami-0152204c1a187337c
        region: us-east-1
        wait: true
        tags:
          Environment: Lab
          CreatedBy: AWX
